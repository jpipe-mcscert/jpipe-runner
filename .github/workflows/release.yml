name: CI & Release Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v3
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('**/script/apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        if: steps.cache-apt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            graphviz \
            libgraphviz-dev \
            pkg-config \
            python3-dev

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

  build-python-package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache apt packages
        id: cache-apt
        uses: actions/cache@v3
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('**/script/apt-packages.txt') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        if: steps.cache-apt.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            graphviz \
            libgraphviz-dev \
            pkg-config \
            python3-dev

      - name: Install dependencies
        run: poetry install

      - name: Build distribution
        run: poetry build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  build-ppa:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up GPG for signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo RELOADAGENT | gpg-connect-agent

      - name: Build Debian package
        run: |
          chmod +x script/build-deb.sh
          script/build-deb.sh ${{ secrets.DEBFULLNAME }} ${{ secrets.DEBEMAIL }} ${{ secrets.GPG_ID }}

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: deb_dist/

  publish-ppa:
    needs: [ build-python-package, build-ppa ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: deb_dist/

      - name: Set up GPG and dput config
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.dput.cf.d/
          touch ~/.dput.cf
          echo "[ppa]" >> ~/.dput.cf
          echo "fqdn = ppa.launchpad.net" >> ~/.dput.cf
          echo "method = ftp" >> ~/.dput.cf
          echo "incoming = ~${{ secrets.LAUNCHPAD_USERNAME }}/ppa/ubuntu/" >> ~/.dput.cf
          echo "login = anonymous" >> ~/.dput.cf

      - name: Install upload tools
        run: sudo apt update && sudo apt install -y dput devscripts

      - name: Publish to PPA
        run: |
          chmod +x script/publish-ppa.sh
          script/publish-ppa.sh "${{ secrets.LAUNCHPAD_USERNAME }}/ppa" deb_dist/*.changes



  publish-pypi:
    needs: [ build-python-package, build-ppa ]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/jpipe-sandbox/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    needs: [ build-python-package, build-ppa ]
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: 'false'
          repository-url: https://test.pypi.org/legacy/

  release:
    permissions:
      contents: write
    needs: [ build-python-package, build-ppa ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Download Python package artifacts (wheel + tar.gz)
      - name: Download Python package distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      # Download Debian source package artifacts
      - name: Download Debian source package artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: deb_dist/

      # Install Debian build tools
      - name: Install Debian build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dh-python python3-all python3-setuptools python3-pip

      # Build the binary .deb package from the downloaded source package
      - name: Build binary Debian package
        run: |
          PKG_DIR=$(find deb_dist -mindepth 1 -maxdepth 1 -type d | head -n1)
          echo "Building .deb package in $PKG_DIR"
          cd "$PKG_DIR"
          debuild -b -us -uc
          cd -

      # Cache Poetry to speed up version retrieval and tagging
      - name: Cache Poetry
        id: cache-poetry
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install Poetry
        if: steps.cache-poetry.outputs.cache-hit != 'true'
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Read the version from Poetry and create a Git tag
      - name: Get version from Poetry and create tag
        id: tag_version
        run: |
          VERSION=$(poetry version -s)
          TAG="v${VERSION}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "Tag to create: $TAG"
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure remote with token
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/jpipe-mcscert/jpipe-runner.git

      # Create and push the new tag
      - name: Create and push git tag
        run: |
          git tag -a $TAG -m "Release $TAG"
          git push origin $TAG
        env:
          TAG: ${{ env.TAG }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create GitHub release for the tag and upload artifacts
      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            deb_dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
