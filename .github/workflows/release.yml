name: CI & Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - feat/v2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          build-essential \
          graphviz \
          libgraphviz-dev \
          pkg-config \
          python3-dev

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

  build-python-package:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            graphviz \
            libgraphviz-dev \
            pkg-config \
            python3-dev

      - name: Install dependencies
        run: poetry install

      - name: Build distribution
        run: poetry build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  build-ppa:
    runs-on: ubuntu-latest
    needs: test
    # needs: build-python-package
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Set up GPG for signing
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo RELOADAGENT | gpg-connect-agent

      - name: Build Debian package
        run: |
          chmod +x script/build-deb.sh
          script/build-deb.sh ${{ secrets.DEBFULLNAME }} ${{ secrets.DEBEMAIL }} ${{ secrets.GPG_ID }}

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: deb_dist/

  publish-ppa:
    needs: build-ppa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: deb_dist/

      - name: Set up GPG and dput config
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          mkdir -p ~/.dput.cf.d/
          touch ~/.dput.cf
          echo "[ppa]" >> ~/.dput.cf
          echo "fqdn = ppa.launchpad.net" >> ~/.dput.cf
          echo "method = ftp" >> ~/.dput.cf
          echo "incoming = ~${{ secrets.LAUNCHPAD_USERNAME }}/ppa/ubuntu/" >> ~/.dput.cf
          echo "login = anonymous" >> ~/.dput.cf

      - name: Install upload tools
        run: sudo apt update && sudo apt install -y dput devscripts

      - name: Publish to PPA
        run: |
          chmod +x script/publish-ppa.sh
          script/publish-ppa.sh "${{ secrets.LAUNCHPAD_USERNAME }}/ppa" deb_dist/*.changes


  publish-pypi:
    needs: build-python-package
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/jpipe-sandbox/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
  publish-testpypi:
    needs: build-python-package
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: 'false'
          repository-url: https://test.pypi.org/legacy/
