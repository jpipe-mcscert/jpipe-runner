name: CI & Release Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'      # run release on version tags like v2.0.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: poetry install --no-dev

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.6.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish to Homebrew (placeholder)
        run: |
          echo "Run your Homebrew publish script here"
          # ./scripts/publish_homebrew.sh

      - name: Publish to Ubuntu repo (placeholder)
        run: |
          echo "Run your Ubuntu publish script here"
          # ./scripts/publish_ubuntu.sh

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
