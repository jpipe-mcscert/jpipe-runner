  publish-testpypi:
    needs: [ build-homebrew-formula ]
    runs-on: ubuntu-latest
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: 'false'
          repository-url: https://test.pypi.org/legacy/

  deploy-docs:
    needs: [ build-homebrew-formula ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation artifact
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs-build/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: '${{ github.token }}'

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-build/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-homebrew-formula:
    permissions:
      contents: write
    # [!] Add or Remove the publish-pypi or publish-testpypi job as needed [!]
    # needs: [ publish-ppa, publish-pypi, build-homebrew-formula ]
    needs: [ publish-ppa, publish-testpypi, build-homebrew-formula, deploy-docs ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v3

      - name: Download formula artifact
        uses: actions/download-artifact@v4
        with:
          name: updated-homebrew-tap
          path: tap

      - name: Clone Homebrew tap repository
        run: |
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_PAT }}@github.com/jpipe-mcscert/homebrew-mcscert.git tap-repo
          ls tap-repo

      - name: Copy new formula into tap repo
        run: |
          VERSION=${{ needs.validate-version.outputs.version }}
          echo "VERSION: $VERSION"
          cp tap/Formula/jpipe-runner.rb tap-repo/
          cp tap/Formula/jpipe-runner@${VERSION}.rb tap-repo/
          cp tap/Formula/jpipe-runner-gui.rb tap-repo/
          cp tap/Formula/jpipe-runner-gui@${VERSION}.rb tap-repo/

      - name: Commit and push formula
        run: |
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add jpipe-runner.rb jpipe-runner@${{ needs.validate-version.outputs.version }}.rb jpipe-runner-gui.rb jpipe-runner-gui@${{ needs.validate-version.outputs.version }}.rb
          git commit -m "Update jpipe-runner formula to version ${{ needs.validate-version.outputs.version }}"
          git push origin main
