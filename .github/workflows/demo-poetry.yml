name: JPipe Runner - Poetry demonstration

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  jpipe-runner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: "latest"

      - name: Create/Set up Poetry environment
        run: |
          cd examples
          poetry init -n
          poetry config virtualenvs.in-project true
          poetry add rich

      - name: Justify Notebook Quality
        uses: "jpipe-mcscert/jpipe-runner@main"
        with:
          jd_file: "models/02_quality_full.jd.json"
          python_path: "poetry run python"
          working_directory: "./examples"
          variable: |
            notebook:notebook.ipynb
          library: |
            libraries/notebook.py
          version: "build/release-pipeline"
