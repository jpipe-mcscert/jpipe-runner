name: "jPipe Runner"
description: "GitHub Action to run justification diagrams of jpipe"
author: "Jason Lyu, Baptiste Lacroix, Sébastien Mosser"

inputs:
  jd_file:
    description: "Path to the justification .jd.json file"
    required: true
  variable:
    description: "Define one or more variables in the format NAME:VALUE, separated by newlines"
    required: false
  config-file:
    description: "Path to the configuration file for jPipe Runner (yaml)"
    required: false
  library:
    description: "Specify one or more Python libraries to load, separated by newlines"
    required: true
  diagram:
    description: "Specify diagram pattern or wildcard"
    required: false
    default: "*"
  format:
    description: "Output format for the diagram, e.g. 'dot', 'gif', 'jpeg', 'jpg', 'pdf', 'png', 'svg'. Default is 'svg'"
    required: false
    default: "svg"
  dry_run:
    description: "Perform a dry run without actually executing justifications"
    required: false
    default: "false"
  python_path:
    description: "Specify a Python path to run jPipe Runner"
    required: false
    default: ""
  working_directory:
    description: "Specify a working directory to run jPipe Runner"
    required: false
    default: "."
  version:
    description: "jPipe Runner version to use, e.g. '0.0.1'. The main branch version is used by default"
    required: false
    default: "main"
  embed_image:
    description: "If true, embed diagram in PR comment otherwise only upload as artifact"
    required: false
    default: "false"
  image_branch:
    description: "Branch name where the image will be committed"
    required: false
    default: ""
  image_repo:
    description: "Target repo (owner/repo) for committing the image; defaults to current repo"
    required: false
    default: ""
  image_path:
    description: "Path where image will be stored in the branch"
    required: false
    default: "diagrams/"
  image_commit_message:
    description: "Commit message for the generated diagram"
    required: false
    default: "Add generated diagram from jPipe Runner"
  github-token:
    description: "GitHub token to authenticate"
    required: false

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz libgraphviz-dev pkg-config

    - name: Set up Python
      if: ${{ !inputs.python_path }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install jpipe-runner
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Install jpipe-runner"
        if poetry env info --path &>/dev/null; then
          echo "Using Poetry"
          poetry add "git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}"
        else
          echo "Using pip"
          $PYTHON_PATH -m pip install -U "git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}"
        fi
        echo "::endgroup::"

    - name: Run jPipe Runner
      id: run_jpipe
      shell: bash
      continue-on-error: true
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        working-directory: ${{ inputs.working_directory }}
        OUTPUT_DIR: /home/runner/work/
      run: |
        set +e
        CMD="$PYTHON_PATH -m jpipe_runner '${{ inputs.jd_file }}'"

        append_flag() {
          local val="$1"; local flag="$2"
          [[ -n "$val" ]] && CMD+=" $flag '$val'"
        }

        # Handleing multiline variables/libraries
        handle_multiline_input() {
          local input="$1"; local flag="$2"
          while IFS= read -r line; do
            [[ -n "$line" ]] && CMD+=" $flag '$line'"
          done <<< "$input"
        }

        handle_multiline_input "${{ inputs.variable }}" "--variable"
        handle_multiline_input "${{ inputs.library }}" "--library"

        append_flag "${{ inputs.config-file }}" "--config-file"
        append_flag "${{ inputs.diagram }}" "--diagram"

        [[ "${{ inputs.dry_run }}" == "true" ]] && CMD+=" --dry-run"

        CMD+=" --output-path $OUTPUT_DIR"
        CMD+=" --format '${{ inputs.format }}'"

        echo "Running: $CMD"
        OUTPUT=$(eval $CMD 2>&1)
        RESULT=$?

        ORIGINAL_FILE=$(find $OUTPUT_DIR -name "*.${{ inputs.format }}" -type f | head -n1)
        COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
        BASENAME=$(basename "$ORIGINAL_FILE" .${{ inputs.format }})
        RENAMED_FILE="${OUTPUT_DIR}${BASENAME}_${COMMIT_SHA}.${{ inputs.format }}"

        mv "$ORIGINAL_FILE" "$RENAMED_FILE"
        echo "result=$RESULT" >> $GITHUB_OUTPUT
        echo "diagram_path=$RENAMED_FILE" >> $GITHUB_OUTPUT
        echo "diagram_name=$(basename "$RENAMED_FILE")" >> $GITHUB_OUTPUT
        # Capture the runner output for coment pr message
        echo "runner_output<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Commit diagram to branch
      if: ${{ inputs.embed_image == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        IMAGE_FILE: ${{ steps.run_jpipe.outputs.diagram_path }}
        IMAGE_NAME: ${{ steps.run_jpipe.outputs.diagram_name }}
      run: |
        set -e
        echo "::group::Committing Diagram"
        TARGET_REPO="${{ inputs.image_repo || github.repository }}"
        git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git" repo
        cd repo

        git fetch origin "${{ inputs.image_branch }}"
        if ! git show-ref --quiet refs/remotes/origin/${{ inputs.image_branch }}; then
          echo "Branch '${{ inputs.image_branch }}' does not exist."
          exit 1
        fi

        git checkout "${{ inputs.image_branch }}"
        REPO_NAME=$(basename "${{ github.event.repository.full_name }}")
        TARGET_FOLDER="${REPO_NAME}_${{ inputs.image_path }}"
        mkdir -p "$TARGET_FOLDER"
        cp "$IMAGE_FILE" "$TARGET_FOLDER/$IMAGE_NAME"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "${{ inputs.image_commit_message }}" || echo "No changes to commit"
        git push origin "${{ inputs.image_branch }}"
        echo "::endgroup::"

    - name: Upload diagram as artifact
      if: always()
      id: upload_diagram
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.run_jpipe.outputs.diagram_name }}
        path: ${{ steps.run_jpipe.outputs.diagram_path }}

    - name: Build comment message
      if: always()
      id: comment_content
      shell: bash
      run: |
        MSG_HEADER="Justification process"
        MSG_HEADER+=" $([[ '${{ steps.run_jpipe.outputs.result }}' == '0' ]] && echo 'completed' || echo 'failed')!\n\n"

        URL="${{ steps.upload_diagram.outputs.artifact-url }}"
        TARGET_REPO="${{ inputs.image_repo || github.repository }}"

        if [[ "${{ inputs.embed_image }}" == "true" ]]; then
          RAW_IMAGE_PATH="${{ inputs.image_path }}"
          # remove leading slash
          CLEANED_PATH="${RAW_IMAGE_PATH#/}"
          # remove trailing slash
          CLEANED_PATH="${CLEANED_PATH%/}"    
          REPO_NAME=$(basename "${{ github.event.repository.full_name }}")
          RAW_URL="https://raw.githubusercontent.com/${TARGET_REPO}/${{ inputs.image_branch }}/${REPO_NAME}_${CLEANED_PATH}/${{ steps.run_jpipe.outputs.diagram_name }}"
          MSG_BODY="![Generated Diagram](${RAW_URL})\n\n[Download Diagram Artifact]($URL)"
        else
          MSG_BODY="[Download Diagram Artifact]($URL)"
        fi

        OUTPUT="${{ steps.run_jpipe.outputs.runner_output }}"
        TRIMMED=$(echo "$OUTPUT" | tail -n +10 | head -c 5000)

        MSG_DETAILS="\n\n<details><summary>Runner Output</summary>\n\n\`\`\`\n$TRIMMED\n\`\`\`\n</details>"

        echo "msg<<EOF" >> $GITHUB_OUTPUT
        echo -e "${MSG_HEADER}${MSG_BODY}${MSG_DETAILS}" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Post PR comment
      if: always()
      uses: actions/github-script@v7
      env:
        PR_COMMENT_MESSAGE: ${{ steps.comment_content.outputs.msg }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const message = process.env.PR_COMMENT_MESSAGE.replace(/\\n/g, '\n');
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: message
          });

    - name: Fail if jPipe Runner failed
      if: ${{ steps.run_jpipe.outputs.result != '0' }}
      shell: bash
      run: exit ${{ steps.run_jpipe.outputs.result }}
