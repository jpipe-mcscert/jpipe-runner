name: "jPipe Runner"
description: "GitHub Action to run justification diagrams of jpipe"
author: "Jason Lyu, Baptiste Lacroix, Sébastien Mosser"

inputs:
  jd_file:
    description: "Path to the justification .jd.json file"
    required: true
  variable:
    description: "Define one or more variables in the format NAME:VALUE, separated by newlines"
    required: false
  config-file:
    description: "Path to the configuration file for jPipe Runner (yaml)"
    required: false
  library:
    description: "Specify one or more Python libraries to load, separated by newlines"
    required: true
  diagram:
    description: "Specify diagram pattern or wildcard"
    required: false
    default: "*"
  format:
    description: "Output format for the diagram, e.g. 'dot', 'gif', 'jpeg', 'jpg', 'pdf', 'png', 'svg'. Default is 'svg'"
    required: false
    default: "svg"
  dry_run:
    description: "Perform a dry run without actually executing justifications"
    required: false
    default: "false"
  python_path:
    description: "Specify a Python path to run jPipe Runner"
    required: false
    default: ""
  working_directory:
    description: "Specify a working directory to run jPipe Runner"
    required: false
    default: "."
  version:
    description: "jPipe Runner version to use, e.g. '0.0.1'. The main branch version is used by default"
    required: false
    default: "main"
  embed_image:
    description: "If true, embed diagram in PR comment otherwise only upload as artifact"
    required: false
    default: "false"
  image_branch:
    description: "Branch name where the image will be committed"
    required: false
    default: ""
  image_repo:
    description: "Target repo (owner/repo) for committing the image; defaults to current repo"
    required: false
    default: ""
  image_path:
    description: "Path where image will be stored in the branch"
    required: false
    default: "diagrams/"
  image_commit_message:
    description: "Commit message for the generated diagram"
    required: false
    default: "Add generated diagram from jPipe Runner"
  github-token:
    description: "GitHub token to authenticate"
    required: false

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz libgraphviz-dev pkg-config

    - name: Set up Python
      if: ${{ !inputs.python_path }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install jpipe-runner
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        working-directory: ${{ inputs.working_directory }}
      run: |
        echo "::group::Install jpipe-runner"
        if poetry env info --path &>/dev/null; then
          echo "Using Poetry"
          poetry add "git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}"
        else
          echo "Using pip"
          $PYTHON_PATH -m pip install -U "git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}"
        fi
        echo "::endgroup::"

    - name: Run jPipe Runner
      id: run_jpipe
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        JD_FILE: ${{ inputs.jd_file }}
        VARIABLE: ${{ inputs.variable }}
        LIBRARY: ${{ inputs.library }}
        CONFIG_FILE: ${{ inputs.config-file }}
        DIAGRAM: ${{ inputs.diagram }}
        DRY_RUN: ${{ inputs.dry_run }}
        FORMAT: ${{ inputs.format }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      run: script/action/run_jpipe.sh

    - name: Commit diagram to branch
      if: ${{ inputs.embed_image == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        IMAGE_FILE: ${{ steps.run_jpipe.outputs.diagram_path }}
        IMAGE_NAME: ${{ steps.run_jpipe.outputs.diagram_name }}
        IMAGE_REPO: ${{ inputs.image_repo }}
        IMAGE_BRANCH: ${{ inputs.image_branch }}
        IMAGE_PATH: ${{ inputs.image_path }}
        IMAGE_COMMIT_MESSAGE: ${{ inputs.image_commit_message }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: script/action/commit_diagram.sh

    - name: Build comment message
      if: always()
      id: comment_content
      shell: bash
      env:
        RESULT: ${{ steps.run_jpipe.outputs.result }}
        EMBED_IMAGE: ${{ inputs.embed_image }}
        ARTIFACT_URL: ${{ steps.upload_diagram.outputs.artifact-url }}
        IMAGE_REPO: ${{ inputs.image_repo }}
        IMAGE_PATH: ${{ inputs.image_path }}
        IMAGE_BRANCH: ${{ inputs.image_branch }}
        DIAGRAM_NAME: ${{ steps.run_jpipe.outputs.diagram_name }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        RUNNER_OUTPUT: ${{ steps.run_jpipe.outputs.runner_output }}
      run: script/action/build_comment.sh


    - name: Post PR comment
      if: always()
      uses: actions/github-script@v7
      env:
        PR_COMMENT_MESSAGE: ${{ steps.comment_content.outputs.msg }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const message = process.env.PR_COMMENT_MESSAGE.replace(/\\n/g, '\n');
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: message
          });

    - name: Fail if jPipe Runner failed
      if: ${{ steps.run_jpipe.outputs.result != '0' }}
      shell: bash
      run: exit ${{ steps.run_jpipe.outputs.result }}
