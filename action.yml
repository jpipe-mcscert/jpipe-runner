name: "jPipe Runner"
description: "GitHub Action to run justification diagrams of jpipe"
author: "Jason Lyu"

inputs:
  jd_file:
    description: "Path to the justification .jd file"
    required: true
  variable:
    description: "Define one or more variables in the format NAME:VALUE, separated by newlines"
    required: false
  library:
    description: "Specify one or more Python libraries to load, separated by newlines"
    required: false
  diagram:
    description: "Specify diagram pattern or wildcard"
    required: false
    default: "*"
  dry_run:
    description: "Perform a dry run without actually executing justifications"
    required: false
    default: "false"
  python_path:
    description: "Specify a Python path to run jPipe Runner"
    required: false
    default: ""
  working_directory:
    description: "Specify a working directory to run jPipe Runner"
    required: false
    default: "."
  version:
    description: "jPipe Runner version to use, e.g. '0.0.1'. The main branch version is used by default"
    required: false
    default: "main"
  github_token:
    description: "GitHub token used to comment on the PR"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Python
      if: ${{ !inputs.python_path }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install jpipe-runner
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        # jpipe-runner installation
        echo "::group::Install jpipe-runner"

        # if $PYTHON_PATH -c "import jpipe_runner" &> /dev/null; then
        #    echo "jpipe-runner already installed"
        #    exit 0
        # fi

        if poetry env info --path &> /dev/null; then
          # Install dependency via poetry
          poetry add 'git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}'
        else
          # Fallback to pip installation
          $PYTHON_PATH -m pip install -U 'git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}'
        fi

        echo "::endgroup::"

    - name: Run jpipe-runner
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
      working-directory: ${{ inputs.working_directory }}
      run: |
        CMD="$PYTHON_PATH -m jpipe_runner '${{ inputs.jd_file }}'"
        if [[ "${{ inputs.variable }}" != "" ]]; then
          while IFS= read -r line; do
            if [[ -n "$line" ]]; then
              CMD+=" --variable '${line}'"
            fi
          done <<< "${{ inputs.variable }}"
        fi
        if [[ "${{ inputs.library }}" != "" ]]; then
          while IFS= read -r line; do
            if [[ -n "$line" ]]; then
              CMD+=" --library '${line}'"
            fi
          done <<< "${{ inputs.library }}"
        fi
        if [[ "${{ inputs.diagram }}" != "" ]]; then
          CMD+=" --diagram '${{ inputs.diagram }}'"
        fi
        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          CMD+=" --dry-run"
        fi
        CMD+=" --output-file diagram.png"
        
        echo "Running command: $CMD"
        eval $CMD
        RESULT=$?

        echo "result=$RESULT" >> $GITHUB_OUTPUT

    - name: Comment with diagram image on PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        OUTPUT_FILE: ./diagram.png
      run: |
        echo "::group::Post PR Comment"
        
        # Ensure gh is installed
        if ! command -v gh &> /dev/null; then
          echo "Installing GitHub CLI..."
          sudo apt update
          sudo apt install -y gh
        fi

        # Infer PR and repo from GitHub context
        PR_NUMBER=$(jq --raw-output .pull_request.number "$GITHUB_EVENT_PATH")
        REPO_FULL=$(jq --raw-output .repository.full_name "$GITHUB_EVENT_PATH")

        if [[ -z "$PR_NUMBER" || -z "$REPO_FULL" ]]; then
          echo "Could not determine PR or repo context."
          exit 1
        fi

        # Encode the image
        BASE64_IMAGE=$(base64 -w 0 "$OUTPUT_FILE")
        
                echo "Preparing comment..."
        if [[ '${{ steps.run_jpipe.outputs.result }}' == '0' ]]; then
          echo "✅ jPipe Runner succeeded!" > comment.md
        else
          echo "❌ jPipe Runner failed! Please review the diagram and logs." > comment.md
        fi
        
        echo "" >> comment.md
        echo "<img src='data:image/png;base64,${BASE64_IMAGE}' alt='Diagram'>" >> comment.md

        gh auth login --with-token <<< "$GH_TOKEN"
        gh pr comment "$PR_NUMBER" --repo "$REPO_FULL" -F comment.md

        echo "::endgroup::"

