name: "jPipe Runner"
description: "GitHub Action to run justification diagrams of jpipe"
author: "Jason Lyu, Baptiste Lacroix, Sébastien Mosser"

inputs:
  jd_file:
    description: "Path to the justification .jd.json file"
    required: true
  variable:
    description: "Define one or more variables in the format NAME:VALUE, separated by newlines"
    required: false
  config-file:
    description: "Path to the configuration file for jPipe Runner (yaml)"
    required: false
  library:
    description: "Specify one or more Python libraries to load, separated by newlines"
    required: true
  diagram:
    description: "Specify diagram pattern or wildcard"
    required: false
    default: "*"
  format:
    description: "Output format for the diagram, e.g. 'dot', 'gif', 'jpeg', 'jpg', 'pdf', 'png', 'svg'. Default is 'svg'"
    required: false
    default: "svg"
  dry_run:
    description: "Perform a dry run without actually executing justifications"
    required: false
    default: "false"
  python_path:
    description: "Specify a Python path to run jPipe Runner"
    required: false
    default: ""
  working_directory:
    description: "Specify a working directory to run jPipe Runner"
    required: false
    default: "."
  version:
    description: "jPipe Runner version to use, e.g. '0.0.1'. The main branch version is used by default"
    required: false
    default: "main"
  embed_image:
    description: "If true, embed diagram in PR comment otherwise only upload as artifact"
    required: false
    default: "false"
  image_branch:
    description: "Branch name where the image will be committed"
    required: false
    default: ""
  image_repo:
    description: "Target repo (owner/repo) for committing the image; defaults to current repo"
    required: false
    default: ""
  image_path:
    description: "Path where image will be stored in the branch"
    required: false
    default: "diagrams/"
  image_commit_message:
    description: "Commit message for the generated diagram"
    required: false
    default: "Add generated diagram from jPipe Runner"
  github-token:
    description: "GitHub token to authenticate"
    required: false

runs:
  using: "composite"
  steps:
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y graphviz libgraphviz-dev pkg-config

    - name: Set up Python
      if: ${{ !inputs.python_path }}
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install jpipe-runner
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        working-directory: ${{ inputs.working_directory }}
      run: |
        # jpipe-runner installation
        echo "::group::Install jpipe-runner"

        if poetry env info --path &> /dev/null; then
          # Install dependency via poetry
          echo "Poetry environment detected - using Poetry for dependency management"
          poetry add 'git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}'
        else
          # Fallback to pip installation
          echo "Poetry not available or not configured - falling back to pip installation"
          $PYTHON_PATH -m pip install -U 'git+https://github.com/jpipe-mcscert/jpipe-runner.git@${{ inputs.version }}'
        fi

        echo "::endgroup::"

    - name: Run jpipe-runner
      id: run_jpipe
      continue-on-error: true
      shell: bash
      env:
        PYTHON_PATH: ${{ inputs.python_path || 'python' }}
        working-directory: ${{ inputs.working_directory }}
        OUTPUT_DIR: /home/runner/work/
      run: |
        set +e
        CMD="$PYTHON_PATH -m jpipe_runner '${{ inputs.jd_file }}'"
        if [[ "${{ inputs.variable }}" != "" ]]; then
          while IFS= read -r line; do
            if [[ -n "$line" ]]; then
              CMD+=" --variable '${line}'"
            fi
          done <<< "${{ inputs.variable }}"
        fi
        if [[ "${{ inputs.config-file }}" != "" ]]; then
          CMD+=" --config-file '${{ inputs.config-file }}'"
        fi
        if [[ "${{ inputs.library }}" != "" ]]; then
          while IFS= read -r line; do
            if [[ -n "$line" ]]; then
              CMD+=" --library '${line}'"
            fi
          done <<< "${{ inputs.library }}"
        fi
        if [[ "${{ inputs.diagram }}" != "" ]]; then
          CMD+=" --diagram '${{ inputs.diagram }}'"
        fi
        if [[ "${{ inputs.dry_run }}" == "true" ]]; then
          CMD+=" --dry-run"
        fi
        CMD+=" --output-path ${OUTPUT_DIR}"
        CMD+=" --format '${{ inputs.format }}'"
        
        echo "Running command: $CMD"
        OUTPUT=$(eval $CMD 2>&1)
        RESULT=$?
        
        # Continue regardless of RESULT
        ORIGINAL_FILE=$(find ${OUTPUT_DIR} -name "*.${{ inputs.format }}" -type f | head -1)
        COMMIT_SHA256="${{ github.event.pull_request.head.sha }}"
        echo "Commit sha256 found: $COMMIT_SHA256"
        BASENAME=$(basename "$ORIGINAL_FILE" ."${{ inputs.format }}")
        RENAMED_FILE="${OUTPUT_DIR}${BASENAME}_${COMMIT_SHA256}.${{ inputs.format }}"
        echo "Renaming file from $ORIGINAL_FILE to $RENAMED_FILE"
        mv "$ORIGINAL_FILE" "$RENAMED_FILE"
        
        DIAGRAM_FILE="$RENAMED_FILE"
        DIAGRAM_NAME=$(basename "$DIAGRAM_FILE")
        
        echo "result=$RESULT" >> $GITHUB_OUTPUT
        echo "diagram_path=$DIAGRAM_FILE" >> $GITHUB_OUTPUT
        echo "diagram_name=$DIAGRAM_NAME" >> $GITHUB_OUTPUT
        echo "runner_output<<EOF" >> $GITHUB_OUTPUT
        echo "$OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Commit diagram to existing branch
      if: ${{ inputs.embed_image == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        IMAGE_FILE: ${{ steps.run_jpipe.outputs.diagram_path }}
        IMAGE_NAME: ${{ steps.run_jpipe.outputs.diagram_name }}
      run: |
        set -e
        echo "::group::Commit diagram to existing branch"

        # Check if the diagram file was generated
        TARGET_REPO="${{ inputs.image_repo }}"
        if [[ -z "$TARGET_REPO" ]]; then
          TARGET_REPO="${{ github.repository }}"
        fi
        
        # Clone the target repository
        git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${TARGET_REPO}.git" repo
        cd repo

        # Check if the image branch exists, if not, exit with an error
        if ! git ls-remote --exit-code --heads origin "${{ inputs.image_branch }}" >/dev/null; then
          echo "Branch '${{ inputs.image_branch }}' does not exist in ${TARGET_REPO}. Please create it manually."
          exit 1
        fi

        git checkout "${{ inputs.image_branch }}"
        mkdir -p "${{ inputs.image_path }}"

        cp "$IMAGE_FILE" "${{ inputs.image_path }}$IMAGE_NAME"
        git add -A
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "${{ inputs.image_commit_message }}" || echo "Nothing to commit"
        git push origin "${{ inputs.image_branch }}"

        echo "::endgroup::"

    - name: Upload diagram as artifact
      id: upload_diagram
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.run_jpipe.outputs.diagram_name }}
        path: ${{ steps.run_jpipe.outputs.diagram_path }}

    - name: Read comment content
      if: always()
      id: comment_content
      shell: bash
      run: |
        if [[ "${{ steps.run_jpipe.outputs.result }}" == "0" ]]; then
          MESSAGE="Justification process completed successfully! \n\n"
        else
          MESSAGE="Justification process failed! \n\n"
        fi
        
        ARTIFACT_URL="${{ steps.upload_diagram.outputs.artifact-url }}"
        TARGET_REPO="${{ inputs.image_repo }}"
        if [[ -z "$TARGET_REPO" ]]; then
          TARGET_REPO="${{ github.repository }}"
        fi

        if [[ "${{ inputs.embed_image }}" == "true" ]]; then
          RAW_URL="https://raw.githubusercontent.com/${TARGET_REPO}/${{ inputs.image_branch }}/${{ inputs.image_path }}${{ steps.run_jpipe.outputs.diagram_name }}"
          MESSAGE+="![Generated Diagram](${RAW_URL})\n\n"
          MESSAGE+="[Download Diagram Artifact](${ARTIFACT_URL})"
        elif [[ "$ARTIFACT_URL" != "" ]]; then
          MESSAGE+="[Download Diagram Artifact]($ARTIFACT_URL)"
        else
          MESSAGE+="No Diagram artifact was generated - please check the logs for details."
        fi
        
        # Skip the first 9 lines of the output (error ascii art) and truncate the rest to 5000 characters (Github comment limit)
        RUNNER_OUTPUT="${{ steps.run_jpipe.outputs.runner_output }}"
        SKIPPED_OUTPUT=$(echo "$RUNNER_OUTPUT" | tail -n +10)
        TRUNCATED_OUTPUT=$(echo "$SKIPPED_OUTPUT" | head -c 5000)

        MESSAGE+="\n\n<details><summary>jPipe Runner Output (click to expand)</summary>\n\n"
        MESSAGE+="\n\`\`\`\n$TRUNCATED_OUTPUT\n\`\`\`\n"
        MESSAGE+="</details>"
        
        # Output comment message
        echo "msg<<EOF" >> $GITHUB_OUTPUT
        echo "$MESSAGE" >> $GITHUB_OUTPUT 
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Post comment with diagram
      if: always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            issue_number: context.issue.number,
            repo: context.repo.repo,
            body: `${{ steps.comment_content.outputs.msg }}`
          })

    - name: Fail if jpipe-runner failed
      if: ${{ steps.run_jpipe.outputs.result != '0' }}
      shell: bash
      run: |
        echo "jPipe Runner failed with exit code ${{ steps.run_jpipe.outputs.result }}"
        exit ${{ steps.run_jpipe.outputs.result }}
